name: adiaphora

# Local development environment. All credentials below are non-secret dev defaults supplied via
# environment variables (see .env.example); never commit a real .env. Every long-running service has
# a health check, and dependents wait for health before starting.

services:
  mysql:
    image: mysql:8.4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-adiaphora}
      MYSQL_USER: ${MYSQL_USER:-adiaphora}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-adiaphora}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-adiaphora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adiaphora-dev-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot job: create the documents bucket once MinIO is healthy, then exit.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-adiaphora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adiaphora-dev-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-adiaphora-documents}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      mc anonymous set none local/$${MINIO_BUCKET};
      exit 0;
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
      - "${MAILPIT_UI_PORT:-8025}:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-adiaphora}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER:-adiaphora}
      DB_PASSWORD: ${MYSQL_PASSWORD:-adiaphora}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-development-access-secret-change-me-01234567890}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-development-refresh-secret-change-me-01234567890}
      DOCUMENT_STORAGE_PATH: /app/var/documents
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      # Object storage + mail wiring (consumed when the S3/MinIO storage adapter and mail are enabled).
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-adiaphora}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-adiaphora-dev-secret}
      STORAGE_S3_BUCKET: ${MINIO_BUCKET:-adiaphora-documents}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      # Use 127.0.0.1 (nginx listens on IPv4; "localhost" resolves to ::1 in the container).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # --- Optional development tooling (docker compose --profile dev-tools up) ---
  adminer:
    image: adminer:latest
    profiles: ["dev-tools"]
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8081}:8080"

volumes:
  mysql-data:
  minio-data:
