server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # No /api proxy here: the SPA calls the backend directly at the absolute URL
    # baked in via the VITE_API_BASE build arg (see Dockerfile), and the backend
    # allows the frontend origin through CORS_ALLOWED_ORIGINS. A proxy upstream
    # would need a resolvable backend hostname at nginx startup, which differs
    # per environment (compose network vs. Railway) and crashes nginx when absent.

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
