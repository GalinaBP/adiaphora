spring:
  application:
    name: adiaphora-platform
  # No default profile on purpose. A profile MUST be selected explicitly (SPRING_PROFILES_ACTIVE):
  # `prod` for real deployments, `local` for a developer machine. With no profile active there are no
  # secret defaults (see the empty ${JWT_ACCESS_SECRET:} below), so the app fails fast instead of
  # silently booting with committed development secrets and seeded accounts. The `spring-boot:run`
  # dev command opts into `local` via the spring-boot-maven-plugin configuration in pom.xml.
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false

server:
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: false

# Application-specific configuration. Secrets come from environment variables (see .env.example).
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  security:
    jwt:
      access-secret: ${JWT_ACCESS_SECRET:}
      refresh-secret: ${JWT_REFRESH_SECRET:}
      access-token-ttl: PT15M
      refresh-token-ttl: P30D
  document:
    storage-path: ${DOCUMENT_STORAGE_PATH:./var/documents}

# Swagger/OpenAPI is a development aid; disabled by default and turned on only in the local profile.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
