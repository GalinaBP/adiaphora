# Production profile. Every secret and connection detail MUST come from the environment; there are
# no defaults here on purpose, so a misconfigured deployment fails fast instead of using weak values.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  security:
    jwt:
      access-secret: ${JWT_ACCESS_SECRET}
      refresh-secret: ${JWT_REFRESH_SECRET}

# Seed data must never run in production.
adiaphora:
  seed:
    enabled: false

# API documentation is disabled in production.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    ru.adiaphora.platform: INFO
