spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/adiaphora?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:adiaphora}
    password: ${DB_PASSWORD:adiaphora}

# Local-only development secrets. NEVER reuse these anywhere real; they exist so the app boots
# without external secret management on a developer machine.
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  security:
    jwt:
      access-secret: ${JWT_ACCESS_SECRET:local-development-access-secret-change-me-01234567890}
      refresh-secret: ${JWT_REFRESH_SECRET:local-development-refresh-secret-change-me-01234567890}

# Seed synthetic accounts/data for local use only (see SeedDataRunner). Never enabled in prod.
adiaphora:
  seed:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    ru.adiaphora.platform: DEBUG
